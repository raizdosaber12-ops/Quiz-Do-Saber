<main>

<div class="feedback-container">

<h1>Deixe o seu Feedback</h1>

<p>A sua opinião é muito importante para melhorar a plataforma.</p>

<form onsubmit="enviarWhatsapp(event)">

<div class="form-group">

<label>Nome</label>

<input
type="text"
id="nome"
placeholder="Digite o seu nome"
required>

</div>

<div class="form-group">

<label>Feedback</label>

<textarea
id="mensagem"
placeholder="Escreva aqui o seu feedback..."
required></textarea>

</div>

<button class="btn-feedback">

Enviar Feedback

</button>

</form>

</div>

</main>



<script src="script.js"></script>

<script>

function enviarWhatsapp(e){

e.preventDefault();

const nome=document.getElementById("nome").value;

const mensagem=document.getElementById("mensagem").value;

const texto=

`📩 *Novo Feedback*%0A%0A👤 Nome: ${nome}%0A%0A💬 Feedback:%0A${mensagem}`;

window.open(
"https://wa.me/244929121797?text="+texto,
"_blank"
);

}

</script>
