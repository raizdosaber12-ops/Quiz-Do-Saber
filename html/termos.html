<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Manutenção</title>
<body>

  <link rel="shortcut icon" href="../img/ICONE02.png" type="image/x-icon">
</head>
<style>
    body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;

  background: linear-gradient(135deg, #f0d57f, #f3de89dc);
  color: #222;
}

.container {
  text-align: center;
}

.numero {
  font-size: 140px;
  margin: 0;
  font-weight: bold;
}

.emoji {
  font-size: 60px;
  margin: 10px 0;
  animation: girar 2s linear infinite;
}

.texto {
  font-size: 22px;
  margin-top: 10px;
  font-weight: 600;
}

.subtexto {
  font-size: 16px;
  opacity: 0.8;
  margin-top: 10px;
}

/* animação do emoji */
@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
<body>

  <div class="container">

    <h1 class="numero">404</h1>

    <div class="emoji">🛠️</div>

    <p class="texto">
      Página não está disponível no momento
    </p>

    <p class="subtexto" id="mensagem">
      Estamos em manutenção...
    </p>

  </div>

  <script>const mensagens = [
  "Estamos em manutenção...",
  "Aguarde um momento ⏳",
  "Melhorando o sistema 🔧",
  "Voltamos já já!"
];

let i = 0;

setInterval(() => {
  i = (i + 1) % mensagens.length;
  document.getElementById("mensagem").textContent = mensagens[i];
}, 2500);</script>

</body>
</html>
